{% extends "base.html" %}
{% block title %}商品列表 - 拼多多销量监控{% endblock %}

{% block content %}
<div class="row g-3 mb-3">
    <div class="col-md-6">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="搜索商品名称..." onkeyup="debounceSearch()">
        </div>
    </div>
    <div class="col-md-6 text-end">
        <small class="text-muted" id="productCount"></small>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>商品名称</th>
                        <th>店铺</th>
                        <th class="text-end">价格</th>
                        <th class="text-end">累计销量</th>
                        <th class="text-end">今日销量</th>
                        <th class="text-end">7天销量</th>
                        <th class="text-end">30天销量</th>
                        <th>链接</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="productsTable">
                    <tr>
                        <td colspan="9" class="text-center text-muted py-4">
                            <div class="spinner-border spinner-border-sm me-2"></div>加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 分页 -->
<nav class="mt-3">
    <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/products.js') }}"></script>
{% endblock %}
